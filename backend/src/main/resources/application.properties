# Spring Boot Application Configuration
# 
# This file contains all configuration settings for the Gamified Stock Market Simulator Backend.
# It's read automatically by Spring Boot when the application starts.
#
# Properties are in key=value format
# Comments start with #

# ============================================
# APPLICATION SETTINGS
# ============================================

# Application name - appears in logs and monitoring
spring.application.name=Gamified Stock Simulator

# Server port - the port on which the application will run
# Default: 8080, meaning app will be accessible at http://localhost:8080
server.port=8080

# ============================================
# DATABASE CONFIGURATION
# ============================================

# Database URL - where the MySQL database is located
# Format: jdbc:mysql://[host]:[port]/[database_name]
# localhost = your local computer
# 3306 = default MySQL port
# stock_simulator = database name (must be created in MySQL first)
spring.datasource.url=jdbc:mysql://localhost:3306/stock_simulator?useSSL=false&serverTimezone=UTC

# Database username - user account to connect to MySQL
spring.datasource.username=root

# Database password - password for the MySQL user account
# IMPORTANT: Change this to your actual MySQL password!
spring.datasource.password=root

# Database driver class - tells Spring which database system we're using
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA/HIBERNATE CONFIGURATION
# ============================================

# Hibernate dialect - tells Hibernate which SQL dialect to use
# MySQL8Dialect = optimized for MySQL version 8+
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Hibernate DDL auto configuration
# Possible values:
#   - create: Drop all tables and recreate them each time (good for testing)
#   - create-drop: Create tables on startup, drop them on shutdown
#   - update: Only modify existing tables (SAFEST for production)
#   - validate: Only validate without making changes (requires tables to exist)
# For development: use 'update' so data persists between restarts
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console - helpful for debugging
# true = print all SQL queries to console
# false = don't show queries (faster, use in production)
spring.jpa.show-sql=true

# Format SQL output to be more readable
spring.jpa.properties.hibernate.format_sql=true

# Add comments to SQL queries showing which method executed them
spring.jpa.properties.hibernate.use_sql_comments=true

# ============================================
# LOGGING CONFIGURATION
# ============================================

# Log level for the entire application
# Levels: TRACE < DEBUG < INFO < WARN < ERROR
# INFO = show important messages and above
logging.level.root=INFO

# Log level for Spring Framework logs
# WARN = show only warnings and errors (hides debug messages)
logging.level.org.springframework=WARN

# Log level for Hibernate (database ORM framework)
# DEBUG = show detailed database operation information
logging.level.org.hibernate=DEBUG

# Log level for our application code
# DEBUG = show all debug information for our custom code
logging.level.com.gamified.stocksimulator=DEBUG

# Log format - customize what information appears in logs
# %d{yyyy-MM-dd HH:mm:ss} = timestamp with date and time
# %5p = log level (padded to 5 chars)
# %logger{36} = logger name (max 36 chars)
# %msg = the actual log message
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%5p] %logger{36} - %msg%n

# ============================================
# CONNECTION POOL SETTINGS
# ============================================

# HikariCP is the database connection pooling library
# Connection pool = reusable connections to avoid creating new ones for each request

# Maximum number of idle connections to keep in pool
spring.datasource.hikari.maximum-pool-size=20

# Minimum number of idle connections to maintain
spring.datasource.hikari.minimum-idle=5

# Maximum time to wait for a connection from the pool (in milliseconds)
spring.datasource.hikari.connection-timeout=30000

# Time a connection can be idle before being closed (in milliseconds)
spring.datasource.hikari.idle-timeout=600000

# ============================================
# SERVLET CONFIGURATION
# ============================================

# Maximum file upload size - limits how large files users can upload
# 10MB = 10 megabytes
spring.servlet.multipart.max-file-size=10MB

# Maximum request size - total size of a single HTTP request
# 10MB = 10 megabytes
spring.servlet.multipart.max-request-size=10MB
